apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fl-minio
  namespace: fl-platform
  labels:
    app: fl-minio
    app.kubernetes.io/part-of: federated-learning
    app.kubernetes.io/component: object-storage
spec:
  serviceName: fl-minio
  replicas: 1
  selector:
    matchLabels:
      app: fl-minio
  template:
    metadata:
      labels:
        app: fl-minio
        app.kubernetes.io/part-of: federated-learning
        app.kubernetes.io/component: object-storage
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: minio
          image: minio/minio
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: fl-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fl-secrets
                  key: MINIO_ROOT_PASSWORD
          volumeMounts:
            - name: minio-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
  volumeClaimTemplates:
    - metadata:
        name: minio-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi

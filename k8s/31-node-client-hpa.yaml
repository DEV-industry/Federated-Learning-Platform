apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fl-node-client-hpa
  namespace: fl-platform
  labels:
    app: fl-node-client
    app.kubernetes.io/part-of: federated-learning
    app.kubernetes.io/component: node-client
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fl-node-client
  minReplicas: 2
  maxReplicas: 1000
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 10
          periodSeconds: 60
        - type: Percent
          value: 100
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 5
          periodSeconds: 60

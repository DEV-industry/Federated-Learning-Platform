apiVersion: apps/v1
kind: Deployment
metadata:
  name: fl-aggregator
  namespace: fl-platform
  labels:
    app: fl-aggregator
    app.kubernetes.io/part-of: federated-learning
    app.kubernetes.io/component: aggregator
spec:
  replicas: 1
  # Scale to >1 once externalized state via GlobalModelStateEntity is verified.
  # The aggregator now persists global model weights to PostgreSQL,
  # so multiple replicas can share state through the database.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: fl-aggregator
  template:
    metadata:
      labels:
        app: fl-aggregator
        app.kubernetes.io/part-of: federated-learning
        app.kubernetes.io/component: aggregator
    spec:
      terminationGracePeriodSeconds: 30
      initContainers:
        # Wait for PostgreSQL to be ready before starting the aggregator
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL at fl-postgres:5432..."
              until nc -z fl-postgres.fl-platform.svc.cluster.local 5432; do
                echo "PostgreSQL not ready. Retrying in 3s..."
                sleep 3
              done
              echo "PostgreSQL is ready!"
      containers:
        - name: aggregator
          image: your-registry/fl-aggregator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: fl-secrets
                  key: POSTGRES_DB
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://fl-postgres.fl-platform.svc.cluster.local:5432/$(POSTGRES_DB)"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: fl-secrets
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fl-secrets
                  key: POSTGRES_PASSWORD
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "update"
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: fl-secrets
                  key: API_KEY
          envFrom:
            - configMapRef:
                name: fl-config
          readinessProbe:
            httpGet:
              path: /api/status
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/status
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1"

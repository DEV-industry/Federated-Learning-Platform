apiVersion: apps/v1
kind: Deployment
metadata:
  name: fl-aggregator
  namespace: fl-platform
  labels:
    app: fl-aggregator
    app.kubernetes.io/part-of: federated-learning
    app.kubernetes.io/component: aggregator
spec:
  replicas: 1
  # Scale to >1 once externalized state via GlobalModelStateEntity is verified.
  # The aggregator now persists global model weights to PostgreSQL,
  # so multiple replicas can share state through the database.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: fl-aggregator
  template:
    metadata:
      labels:
        app: fl-aggregator
        app.kubernetes.io/part-of: federated-learning
        app.kubernetes.io/component: aggregator
    spec:
      terminationGracePeriodSeconds: 30
      initContainers:
        # Wait for PostgreSQL to be ready before starting the aggregator
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL at fl-postgres:5432..."
              until nc -z fl-postgres.fl-platform.svc.cluster.local 5432; do
                echo "PostgreSQL not ready. Retrying in 3s..."
                sleep 3
              done
              echo "PostgreSQL is ready!"
        # Wait for RabbitMQ to be ready
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for RabbitMQ at rabbitmq:5672..."
              until nc -z rabbitmq.fl-platform.svc.cluster.local 5672; do
                echo "RabbitMQ not ready. Retrying in 3s..."
                sleep 3
              done
              echo "RabbitMQ is ready!"
        # Wait for MinIO to be ready
        - name: wait-for-minio
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for MinIO at fl-minio:9000..."
              until nc -z fl-minio.fl-platform.svc.cluster.local 9000; do
                echo "MinIO not ready. Retrying in 3s..."
                sleep 3
              done
              echo "MinIO is ready!"
        # Auto-create the fl-models bucket
        - name: create-bucket
          image: minio/mc
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: fl-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fl-secrets
                  key: MINIO_ROOT_PASSWORD
          command:
            - sh
            - -c
            - |
              mc alias set myminio http://fl-minio.fl-platform.svc.cluster.local:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD
              mc mb --ignore-existing myminio/fl-models
              echo "Bucket fl-models created successfully"
      containers:
        - name: aggregator
          image: fl-aggregator:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: fl-secrets
                  key: POSTGRES_DB
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://fl-postgres.fl-platform.svc.cluster.local:5432/$(POSTGRES_DB)"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: fl-secrets
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fl-secrets
                  key: POSTGRES_PASSWORD
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "update"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: fl-secrets
                  key: JWT_SECRET
            - name: NODE_SECRET
              valueFrom:
                secretKeyRef:
                  name: fl-secrets
                  key: NODE_SECRET
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: fl-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: fl-secrets
                  key: MINIO_ROOT_PASSWORD
            - name: SPRING_RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: fl-secrets
                  key: RABBITMQ_DEFAULT_USER
            - name: SPRING_RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fl-secrets
                  key: RABBITMQ_DEFAULT_PASS
          envFrom:
            - configMapRef:
                name: fl-config
          readinessProbe:
            httpGet:
              path: /api/status
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/status
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1"


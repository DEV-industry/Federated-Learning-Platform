  name: fl-postgres
  namespace: fl-platform
  labels:
    app: fl-postgres
    app.kubernetes.io/part-of: federated-learning
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  selector:
    app: fl-postgres
  ports:

apiVersion: apps/v1
kind: Deployment
metadata:
  name: aggregator
  namespace: fl-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fl-aggregator
  template:
    metadata:
      labels:
        app: fl-aggregator
    spec:
      containers:
      - name: aggregator
        image: fl-aggregator:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8443
          name: web
        - containerPort: 9443
          name: grpc
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres:5432/fldb"
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: fl-secrets
              key: db-username
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: fl-secrets
              key: db-password
        - name: SERVER_PORT
          value: "8443"
        - name: SERVER_SSL_ENABLED
          value: "true"
        - name: SERVER_SSL_CERTIFICATE
          value: "/certs/aggregator-server.crt"
        - name: SERVER_SSL_CERTIFICATE_PRIVATE_KEY
          value: "/certs/aggregator-server.key"
        - name: GRPC_SERVER_PORT
          value: "9443"
        - name: GRPC_SERVER_SECURITY_ENABLED
          value: "true"
        - name: GRPC_SERVER_SECURITY_CERTIFICATE_CHAIN
          value: "/certs/aggregator-server.crt"
        - name: GRPC_SERVER_SECURITY_PRIVATE_KEY
          value: "/certs/aggregator-server.key"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: fl-secrets
              key: jwt-secret
        - name: MINIO_URL
          value: "http://minio:9000"
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: fl-secrets
              key: minio-root-user
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: fl-secrets
              key: minio-root-password
        - name: MINIO_BUCKET
          value: "fl-models"
        - name: SPRING_RABBITMQ_HOST
          value: "rabbitmq"
        - name: SPRING_RABBITMQ_PORT
          value: "5672"
        - name: SPRING_RABBITMQ_USERNAME
          valueFrom:
            secretKeyRef:
              name: fl-secrets
              key: rabbitmq-user
        - name: SPRING_RABBITMQ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: fl-secrets
              key: rabbitmq-pass
        - name: FL_AGGREGATION_STRATEGY
          value: "BULYAN"
        - name: FL_HE_ENABLED
          value: "true"
        - name: FL_HE_SIDECAR_URL
          value: "http://he-sidecar:8001"
        - name: FL_SECURITY_MALICIOUS_FRACTION
          value: "0.25"
        volumeMounts:
        - name: aggregator-tls-certs
          mountPath: /certs
          readOnly: true
      volumes:
      - name: aggregator-tls-certs
        secret:
          secretName: fl-tls-certs
---
apiVersion: v1
kind: Service
metadata:
  name: aggregator
  namespace: fl-system
spec:
  ports:
  - port: 8443
    name: web
  - port: 9443
    name: grpc
  selector:
    app: fl-aggregator

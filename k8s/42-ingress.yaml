apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fl-ingress
  namespace: fl-platform
  labels:
    app.kubernetes.io/part-of: federated-learning
    app.kubernetes.io/component: ingress
  annotations:
    # NGINX Ingress Controller annotations
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    # WebSocket support for STOMP real-time updates
    nginx.ingress.kubernetes.io/websocket-services: fl-aggregator
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - fl.local
      secretName: fl-ingress-tls
    - hosts:
        - api.fl.local
      secretName: fl-ingress-tls
  rules:
    - host: fl.local
      http:
        paths:
          # API and WebSocket traffic → Aggregator
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: fl-aggregator
                port:
                  number: 8443
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: fl-aggregator
                port:
                  number: 8443
          - path: /ws-sockjs
            pathType: Prefix
            backend:
              service:
                name: fl-aggregator
                port:
                  number: 8443
          # All other traffic → Frontend (Next.js dashboard)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fl-frontend
                port:
                  number: 3000
    - host: api.fl.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: fl-aggregator
                port:
                  number: 8443
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: fl-aggregator
                port:
                  number: 8443
          - path: /ws-sockjs
            pathType: Prefix
            backend:
              service:
                name: fl-aggregator
                port:
                  number: 8443

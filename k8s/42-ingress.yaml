apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fl-ingress
  namespace: fl-platform
  labels:
    app.kubernetes.io/part-of: federated-learning
    app.kubernetes.io/component: ingress
  annotations:
    # NGINX Ingress Controller annotations
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # WebSocket support for STOMP real-time updates
    nginx.ingress.kubernetes.io/websocket-services: fl-aggregator
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  ingressClassName: nginx
  rules:
    - host: fl.local
      http:
        paths:
          # API and WebSocket traffic → Aggregator
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: fl-aggregator
                port:
                  number: 8080
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: fl-aggregator
                port:
                  number: 8080
          - path: /ws-sockjs
            pathType: Prefix
            backend:
              service:
                name: fl-aggregator
                port:
                  number: 8080
          # All other traffic → Frontend (Next.js dashboard)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fl-frontend
                port:
                  number: 3000

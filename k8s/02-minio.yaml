apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: fl-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
      - name: minio
        image: minio/minio
        command: ["server", "/data", "--console-address", ":9001"]
        ports:
        - containerPort: 9000
        - containerPort: 9001
        env:
        - name: MINIO_ROOT_USER
          valueFrom:
            secretKeyRef:
              name: fl-secrets
              key: minio-root-user
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: fl-secrets
              key: minio-root-password
        volumeMounts:
        - name: minio-data
          mountPath: /data
      volumes:
      - name: minio-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: fl-system
spec:
  ports:
  - port: 9000
    name: api
  - port: 9001
    name: console
  selector:
    app: minio
---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: fl-system
spec:
  template:
    spec:
      containers:
      - name: minio-init
        image: minio/mc
        env:
        - name: MINIO_ROOT_USER
          valueFrom:
            secretKeyRef:
              name: fl-secrets
              key: minio-root-user
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: fl-secrets
              key: minio-root-password
        command:
        - /bin/sh
        - -c
        - |
          until mc alias set myminio http://minio:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD; do echo 'Waiting for MinIO...'; sleep 2; done;
          mc mb --ignore-existing myminio/fl-models;
          echo 'Bucket fl-models created successfully';
      restartPolicy: OnFailure

apiVersion: v1
kind: Service
metadata:
  name: fl-aggregator-grpc-external
  namespace: fl-platform
  labels:
    app: fl-aggregator
    app.kubernetes.io/part-of: federated-learning
    app.kubernetes.io/component: aggregator
  annotations:
    # Cloud-provider specific annotations can be added here (NLB/ILB, static IP, etc.).
    # Example (AWS): service.beta.kubernetes.io/aws-load-balancer-type: nlb
    # Example (Azure): service.beta.kubernetes.io/azure-load-balancer-resource-group: <rg>
    # Example (GCP): networking.gke.io/load-balancer-type: External
spec:
  type: LoadBalancer
  selector:
    app: fl-aggregator
  ports:
    - name: grpc-tls
      protocol: TCP
      port: 9443
      targetPort: 9443

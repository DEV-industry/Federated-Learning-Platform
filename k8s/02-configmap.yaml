apiVersion: v1
kind: ConfigMap
metadata:
  name: fl-config
  namespace: fl-platform
  labels:
    app.kubernetes.io/part-of: federated-learning
data:
  # Aggregator configuration
  AGGREGATOR_BASE_URL: "https://fl-aggregator.fl-platform.svc.cluster.local:8443"
  AGGREGATOR_GRPC_URL: "fl-aggregator.fl-platform.svc.cluster.local:9443"
  # External endpoints for physical nodes (replace 'aggregator-api.example.com' with your public domain)
  AGGREGATOR_EXTERNAL_BASE_URL: "https://aggregator-api.example.com:8443"
  AGGREGATOR_EXTERNAL_GRPC_URL: "aggregator-api.example.com:9443"
  NODE_ENDPOINT_MODE: "internal"
  TLS_VERIFY: "true"
  TLS_CA_CERT_PATH: "/certs/ca.crt"
  # SNI (Server Name Indication) for TLS handshake on external gRPC endpoint
  # Should match the certificate CN or SAN when using external domain
  GRPC_SSL_TARGET_NAME_OVERRIDE: "aggregator-api.example.com"
  SPRING_RABBITMQ_HOST: "rabbitmq"
  SPRING_RABBITMQ_PORT: "5672"
  FL_MIN_QUORUM: "3"
  FL_QUORUM_TIMEOUT: "120"
  FL_QUORUM_CHECK_INTERVAL: "10000"
  FL_SECURITY_THRESHOLD: "5.0"
  FL_HEARTBEAT_STALE: "60"
  FL_HEARTBEAT_CHECK_INTERVAL: "15000"
  FL_SECURITY_ENROLLMENT_REQUIRED_FOR_NEW_NODES: "false"

  # MinIO Object Storage
  MINIO_URL: "http://fl-minio.fl-platform.svc.cluster.local:9000"
  MINIO_BUCKET: "fl-models"

  # Node client configuration
  DP_ENABLED: "true"
  DP_NOISE_MULTIPLIER: "0.01"
  FEDPROX_MU: "0.01"
  DATA_PARTITION_FRACTION: "0.5"
  HEARTBEAT_INTERVAL: "20"
  CLIENT_VERSION: "node-client-1.0.0"

  # Frontend configuration
  NEXT_PUBLIC_API_URL: "https://fl.local"

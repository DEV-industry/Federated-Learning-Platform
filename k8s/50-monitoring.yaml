apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'aggregator'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['aggregator-service:8080']
      - job_name: 'node-clients'
        metrics_path: '/metrics'
        kubernetes_sd_configs:
          - role: pod
            selectors:
              - role: pod
                label: "app=fl-node-client"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-service:9090
        access: proxy
        isDefault: true
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
data:
  dashboard.yml: |
    apiVersion: 1
    providers:
      - name: 'FL Dashboards'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        allowUiUpdates: true
        options:
          path: /etc/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-json
data:
  fl_dashboard.json: |
    {
      "title": "Federated Learning Analytics",
      "timezone": "browser",
      "templating": {
        "list": [
          {
            "name": "NodeId",
            "type": "query",
            "datasource": "Prometheus",
            "query": "label_values(fl_round_duration_seconds, nodeId)",
            "refresh": 1,
            "includeAll": true,
            "multi": true,
            "allValue": ".*"
          }
        ]
      },
      "panels": [
        {
          "title": "Nodes Status",
          "type": "stat",
          "datasource": "Prometheus",
          "targets": [{"expr": "fl_nodes_total", "legendFormat": "{{status}}"}],
          "gridPos": {"x": 0, "y": 0, "w": 24, "h": 4}
        },
        {
          "title": "Round Duration (Seconds)",
          "type": "timeseries",
          "datasource": "Prometheus",
          "targets": [{"expr": "fl_round_duration_seconds{nodeId=~\"^$NodeId$\"}", "legendFormat": "{{nodeId}}"}],
          "gridPos": {"x": 0, "y": 4, "w": 12, "h": 8}
        },
        {
          "title": "Total Models Rejected",
          "type": "stat",
          "datasource": "Prometheus",
          "targets": [{"expr": "sum(fl_models_rejected_total{nodeId=~\"^$NodeId$\"})", "legendFormat": "Rejected"}],
          "gridPos": {"x": 12, "y": 4, "w": 12, "h": 8}
        },
        {
          "title": "Aggregator CPU Usage",
          "type": "timeseries",
          "datasource": "Prometheus",
          "targets": [{"expr": "process_cpu_usage{job=\"aggregator\"}", "legendFormat": "CPU"}],
          "gridPos": {"x": 0, "y": 12, "w": 12, "h": 8}
        },
        {
          "title": "Aggregator JVM Memory Usage",
          "type": "timeseries",
          "datasource": "Prometheus",
          "targets": [{"expr": "jvm_memory_used_bytes{job=\"aggregator\"}", "legendFormat": "JVM Memory"}],
          "gridPos": {"x": 12, "y": 12, "w": 12, "h": 8}
        }
      ],
      "schemaVersion": 39,
      "version": 1
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config-volume
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
      volumes:
        - name: config-volume
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
  selector:
    app: prometheus
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: grafana-dashboards-json
              mountPath: /etc/grafana/dashboards
      volumes:
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-dashboards-provider
          configMap:
            name: grafana-dashboards-provider
        - name: grafana-dashboards-json
          configMap:
            name: grafana-dashboards-json
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
spec:
  type: LoadBalancer
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: grafana

apiVersion: apps/v1
kind: Deployment
metadata:
  name: fl-node-client
  namespace: fl-platform
  labels:
    app: fl-node-client
    app.kubernetes.io/part-of: federated-learning
    app.kubernetes.io/component: node-client
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fl-node-client
  template:
    metadata:
      labels:
        app: fl-node-client
        app.kubernetes.io/part-of: federated-learning
        app.kubernetes.io/component: node-client
    spec:
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: wait-for-aggregator
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Aggregator at fl-aggregator:8443 over HTTPS..."
              until wget --no-check-certificate -q --spider https://fl-aggregator.fl-platform.svc.cluster.local:8443/api/status; do
                echo "Aggregator not ready. Retrying in 5s..."
                sleep 5
              done
              echo "Aggregator is ready!"
      containers:
        - name: node-client
          image: fl-node-client:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: DP_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: fl-config
                  key: DP_ENABLED
            - name: DP_NOISE_MULTIPLIER
              valueFrom:
                configMapKeyRef:
                  name: fl-config
                  key: DP_NOISE_MULTIPLIER
            - name: FEDPROX_MU
              valueFrom:
                configMapKeyRef:
                  name: fl-config
                  key: FEDPROX_MU
            - name: DATA_PARTITION_FRACTION
              valueFrom:
                configMapKeyRef:
                  name: fl-config
                  key: DATA_PARTITION_FRACTION
            - name: HEARTBEAT_INTERVAL
              valueFrom:
                configMapKeyRef:
                  name: fl-config
                  key: HEARTBEAT_INTERVAL
            - name: AGGREGATOR_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: fl-config
                  key: AGGREGATOR_BASE_URL
            - name: AGGREGATOR_GRPC_URL
              valueFrom:
                configMapKeyRef:
                  name: fl-config
                  key: AGGREGATOR_GRPC_URL
            - name: AGGREGATOR_EXTERNAL_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: fl-config
                  key: AGGREGATOR_EXTERNAL_BASE_URL
            - name: AGGREGATOR_EXTERNAL_GRPC_URL
              valueFrom:
                configMapKeyRef:
                  name: fl-config
                  key: AGGREGATOR_EXTERNAL_GRPC_URL
            - name: NODE_ENDPOINT_MODE
              valueFrom:
                configMapKeyRef:
                  name: fl-config
                  key: NODE_ENDPOINT_MODE
            - name: TLS_VERIFY
              valueFrom:
                configMapKeyRef:
                  name: fl-config
                  key: TLS_VERIFY
            - name: TLS_CA_CERT_PATH
              valueFrom:
                configMapKeyRef:
                  name: fl-config
                  key: TLS_CA_CERT_PATH
            - name: CLIENT_VERSION
              valueFrom:
                configMapKeyRef:
                  name: fl-config
                  key: CLIENT_VERSION
            - name: NODE_PRIVATE_KEY_PATH
              value: "/tmp/node_identity_ed25519.pem"
            - name: NODE_ENROLLMENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: fl-secrets
                  key: FL_SECURITY_ENROLLMENT_TOKEN
                  optional: true
          volumeMounts:
            - name: aggregator-ca-cert
              mountPath: /certs
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1"
      volumes:
        - name: aggregator-ca-cert
          secret:
            secretName: fl-tls-certs

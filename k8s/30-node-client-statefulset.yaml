apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fl-node-client
  namespace: fl-platform
  labels:
    app: fl-node-client
    app.kubernetes.io/part-of: federated-learning
    app.kubernetes.io/component: node-client
spec:
  serviceName: "fl-node-client-svc"
  replicas: 5
  selector:
    matchLabels:
      app: fl-node-client
  template:
    metadata:
      labels:
        app: fl-node-client
        app.kubernetes.io/part-of: federated-learning
        app.kubernetes.io/component: node-client
    spec:
      terminationGracePeriodSeconds: 30
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - fl-node-client
                topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-for-aggregator
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Aggregator at fl-aggregator:8080..."
              until wget -q --spider http://fl-aggregator.fl-platform.svc.cluster.local:8080/api/status; do
                echo "Aggregator not ready. Retrying in 5s..."
                sleep 5
              done
              echo "Aggregator is ready!"
      containers:
        - name: node-client
          image: fl-node-client:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: DP_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: fl-config
                  key: DP_ENABLED
            - name: DP_NOISE_MULTIPLIER
              valueFrom:
                configMapKeyRef:
                  name: fl-config
                  key: DP_NOISE_MULTIPLIER
            - name: FEDPROX_MU
              valueFrom:
                configMapKeyRef:
                  name: fl-config
                  key: FEDPROX_MU
            - name: DATA_PARTITION_FRACTION
              valueFrom:
                configMapKeyRef:
                  name: fl-config
                  key: DATA_PARTITION_FRACTION
            - name: HEARTBEAT_INTERVAL
              valueFrom:
                configMapKeyRef:
                  name: fl-config
                  key: HEARTBEAT_INTERVAL
            - name: AGGREGATOR_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: fl-config
                  key: AGGREGATOR_BASE_URL
            - name: NODE_SECRET
              valueFrom:
                secretKeyRef:
                  name: fl-secrets
                  key: NODE_SECRET
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fl-network

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fl-network

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing myminio/$${MINIO_BUCKET};
      echo 'Bucket $${MINIO_BUCKET} created successfully';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-fl-models}
    networks:
      - fl-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_ERLANG_COOKIE: "fl-platform-secret-cookie-123"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fl-network

  aggregator:
    build: ./aggregator
    ports:
      - "8080:8080"
      - "9090:9090"
    restart: on-failure
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - JWT_SECRET=${JWT_SECRET}
      - NODE_SECRET=${NODE_SECRET}
      - MINIO_URL=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MINIO_BUCKET=${MINIO_BUCKET:-fl-models}
      - SPRING_RABBITMQ_HOST=rabbitmq
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - fl-network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      aggregator:
        condition: service_healthy
    networks:
      - fl-network

  node_client_1:
    build: ./node_client
    environment:
      - AGGREGATOR_BASE_URL=http://aggregator:8080
      - AGGREGATOR_GRPC_URL=aggregator:9090
      - NODE_ID=node-1
      - DP_ENABLED=true
      - DP_NOISE_MULTIPLIER=0.01
      - FEDPROX_MU=${FEDPROX_MU}
      - NODE_SECRET=${NODE_SECRET}
    depends_on:
      aggregator:
        condition: service_healthy
    networks:
      - fl-network

  node_client_2:
    build: ./node_client
    environment:
      - AGGREGATOR_BASE_URL=http://aggregator:8080
      - AGGREGATOR_GRPC_URL=aggregator:9090
      - NODE_ID=node-2
      - DP_ENABLED=true
      - DP_NOISE_MULTIPLIER=0.01
      - FEDPROX_MU=${FEDPROX_MU}
      - NODE_SECRET=${NODE_SECRET}
    depends_on:
      aggregator:
        condition: service_healthy
    networks:
      - fl-network

networks:
  fl-network:
    driver: bridge

volumes:
  minio-data:


services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fl-network

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fl-network

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing myminio/$${MINIO_BUCKET};
      echo 'Bucket $${MINIO_BUCKET} created successfully';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-fl-models}
    networks:
      - fl-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: fluser
      RABBITMQ_DEFAULT_PASS: flpass
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - fl-network

  aggregator:
    build: ./aggregator
    ports:
      - "8080:8080"
      - "9090:9090"
    restart: on-failure
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - JWT_SECRET=${JWT_SECRET}
      - NODE_SECRET=${NODE_SECRET}
      - MINIO_URL=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MINIO_BUCKET=${MINIO_BUCKET:-fl-models}
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=fluser
      - SPRING_RABBITMQ_PASSWORD=flpass
      - FL_AGGREGATION_STRATEGY=BULYAN
      - FL_HE_ENABLED=true
      - FL_HE_SIDECAR_URL=http://he-sidecar:8001
      - FL_SECURITY_MALICIOUS_FRACTION=0.25
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - fl-network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      aggregator:
        condition: service_healthy
    networks:
      - fl-network

  node_client_1:
    build: ./node_client
    environment:
      - AGGREGATOR_BASE_URL=http://aggregator:8080
      - AGGREGATOR_GRPC_URL=aggregator:9090
      - NODE_ID=node-1
      - DP_ENABLED=true
      - HE_ENABLED=true
      - DATA_PARTITION_FRACTION=0.3
      - DP_NOISE_MULTIPLIER=0.01
      - FEDPROX_MU=${FEDPROX_MU}
      - NODE_SECRET=${NODE_SECRET}
    depends_on:
      aggregator:
        condition: service_healthy
    networks:
      - fl-network

  node_client_2:
    build: ./node_client
    environment:
      - AGGREGATOR_BASE_URL=http://aggregator:8080
      - AGGREGATOR_GRPC_URL=aggregator:9090
      - NODE_ID=node-2
      - DP_ENABLED=true
      - HE_ENABLED=true
      - DATA_PARTITION_FRACTION=0.3
      - DP_NOISE_MULTIPLIER=0.01
      - FEDPROX_MU=${FEDPROX_MU}
      - NODE_SECRET=${NODE_SECRET}
    depends_on:
      aggregator:
        condition: service_healthy
    networks:
      - fl-network

  node_client_3:
    build: ./node_client
    environment:
      - AGGREGATOR_BASE_URL=http://aggregator:8080
      - AGGREGATOR_GRPC_URL=aggregator:9090
      - NODE_ID=node-3
      - DP_ENABLED=true
      - HE_ENABLED=true
      - DATA_PARTITION_FRACTION=0.3
      - DP_NOISE_MULTIPLIER=0.01
      - FEDPROX_MU=${FEDPROX_MU}
      - NODE_SECRET=${NODE_SECRET}
    depends_on:
      aggregator:
        condition: service_healthy
    networks:
      - fl-network

  he-sidecar:
    build: ./he_sidecar
    container_name: fl-he-sidecar
    ports:
      - "8001:8001"
    networks:
      - fl-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9091:9090"
    networks:
      - fl-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000" # Mapped to 3001 as frontend usually runs on 3000
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - fl-network

networks:
  fl-network:
    driver: bridge

volumes:
  minio-data:
  rabbitmq-data:


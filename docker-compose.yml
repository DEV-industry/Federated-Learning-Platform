services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    networks:
      - fl-network

  aggregator:
    build: ./aggregator
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - API_KEY=${API_KEY}
    depends_on:
      - postgres
    networks:
      - fl-network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - aggregator
    networks:
      - fl-network

  node_client_1:
    build: ./node_client
    environment:
      - AGGREGATOR_URL=http://aggregator:8080/api/weights
      - NODE_ID=node-1
      - DP_ENABLED=true
      - DP_NOISE_MULTIPLIER=0.01
      - FEDPROX_MU=${FEDPROX_MU}
      - API_KEY=${API_KEY}
    depends_on:
      - aggregator
    networks:
      - fl-network

  node_client_2:
    build: ./node_client
    environment:
      - AGGREGATOR_URL=http://aggregator:8080/api/weights
      - NODE_ID=node-2
      - DP_ENABLED=true
      - DP_NOISE_MULTIPLIER=0.01
      - FEDPROX_MU=${FEDPROX_MU}
      - API_KEY=${API_KEY}
    depends_on:
      - aggregator
    networks:
      - fl-network

networks:
  fl-network:
    driver: bridge

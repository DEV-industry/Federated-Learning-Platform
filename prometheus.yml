global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'aggregator'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['aggregator:8080']

  - job_name: 'node-clients'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['node_client_1:8000', 'node_client_2:8000']

syntax = "proto3";

package federated;

option java_package = "com.flplatform.aggregator.grpc";
option java_outer_classname = "FederatedProto";
option java_multiple_files = true;

service FederatedService {
    rpc SubmitWeights (WeightRequest) returns (WeightResponse);
    rpc GetGlobalModel (GlobalModelRequest) returns (GlobalModelResponse);
}

message WeightRequest {
    string node_id = 1;
    repeated double weights = 2;
    double loss = 3;
    bool dp_enabled = 4;
    double accuracy = 5;
    int32 round_number = 6;
    // Homomorphic Encryption fields
    bool he_enabled = 7;
    bytes encrypted_weights = 8;        // Serialized TenSEAL CKKS ciphertext
    bytes he_context_public = 9;        // Serialized public TenSEAL context (for aggregation)
}

message WeightResponse {
    string status = 1;
    string message = 2;
}

message GlobalModelRequest {
    string node_id = 1;
}

message GlobalModelResponse {
    int32 current_round = 1;
    repeated double global_weights = 2;
    // HE: aggregated ciphertext returned when HE mode is active
    bool he_enabled = 3;
    bytes encrypted_global_weights = 4;
}

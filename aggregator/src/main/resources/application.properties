server.port=8080
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fldb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# Security / Anomaly Detection
fl.security.malicious-fraction=${FL_SECURITY_MALICIOUS_FRACTION:0.3}

# Dynamic Quorum Configuration (K8s-compatible)
fl.min.quorum=${FL_MIN_QUORUM:2}
fl.round.timeout.seconds=${FL_ROUND_TIMEOUT:300}
fl.round.min.completion.percentage=${FL_ROUND_MIN_COMPLETION_PERCENTAGE:0.7}
fl.quorum.check-interval-ms=${FL_QUORUM_CHECK_INTERVAL:10000}

# Heartbeat Configuration
fl.heartbeat.stale-threshold-seconds=${FL_HEARTBEAT_STALE:60}
fl.heartbeat.check-interval-ms=${FL_HEARTBEAT_CHECK_INTERVAL:15000}

# MinIO Object Storage
minio.url=${MINIO_URL:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY}
minio.secret-key=${MINIO_SECRET_KEY}
minio.bucket=${MINIO_BUCKET:fl-models}

# RabbitMQ
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD}

# JWT Authentication
jwt.secret=${JWT_SECRET}
node.secret=${NODE_SECRET}
grpc.server.port=9090

# Actuator / Prometheus Metrics
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

server.port=8080
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fldb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# Security / Anomaly Detection
fl.security.threshold=${FL_SECURITY_THRESHOLD:5.0}

# Dynamic Quorum Configuration (K8s-compatible)
fl.min.quorum=${FL_MIN_QUORUM:2}
fl.quorum.timeout-seconds=${FL_QUORUM_TIMEOUT:120}
fl.quorum.check-interval-ms=${FL_QUORUM_CHECK_INTERVAL:10000}

# Heartbeat Configuration
fl.heartbeat.stale-threshold-seconds=${FL_HEARTBEAT_STALE:60}
fl.heartbeat.check-interval-ms=${FL_HEARTBEAT_CHECK_INTERVAL:15000}

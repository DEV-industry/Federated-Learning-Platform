server.port=8080
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fldb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:fluser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:flpassword}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
